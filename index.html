<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Modern App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100">
        
        <div class="text-center mb-8">
            <div class="bg-blue-600 w-12 h-12 rounded-lg flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-bolt text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Welcome Back</h1>
            <p class="text-slate-500">Please enter your details to sign in</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <button class="flex items-center justify-center gap-2 border border-slate-200 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5">
                <span class="text-sm font-medium">Google</span>
            </button>
            <button class="flex items-center justify-center gap-2 border border-slate-200 py-2 rounded-lg hover:bg-slate-50 transition-colors">
                <i class="fab fa-apple text-lg"></i>
                <span class="text-sm font-medium">Apple</span>
            </button>
        </div>

        <div class="relative flex items-center mb-6">
            <div class="flex-grow border-t border-slate-200"></div>
            <span class="flex-shrink mx-4 text-slate-400 text-sm">or email</span>
            <div class="flex-grow border-t border-slate-200"></div>
        </div>

        <form action="#" method="POST" class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <input type="email" placeholder="name@company.com" required
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
            </div>

            <div class="relative">
                <div class="flex justify-between mb-1">
                    <label class="text-sm font-medium text-slate-700">Password</label>
                    <a href="#" class="text-sm text-blue-600 hover:underline">Forgot?</a>
                </div>
                <input type="password" id="passwordField" placeholder="••••••••" required
                    class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all">
                <button type="button" onclick="togglePassword()" class="absolute right-3 top-[38px] text-slate-400 hover:text-slate-600">
                    <i id="toggleIcon" class="fas fa-eye"></i>
                </button>
            </div>

            <div class="flex items-center gap-2">
                <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 rounded">
                <label for="remember" class="text-sm text-slate-600">Remember for 30 days</label>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2.5 rounded-lg hover:bg-blue-700 transition-all shadow-lg shadow-blue-200">
                Sign In
            </button>
        </form>

        <p class="text-center text-sm text-slate-600 mt-8">
            Don't have an account? <a href="#" class="text-blue-600 font-semibold hover:underline">Create account</a>
        </p>
    </div>

    <script>
        function togglePassword() {
            const passwordField = document.getElementById('passwordField');
            const icon = document.getElementById('toggleIcon');
            if (passwordField.type === 'password') {
                passwordField.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                passwordField.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
